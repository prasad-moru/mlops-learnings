global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

scrape_configs:

  # FastAPI /metrics — auto-instrumented by prometheus_fastapi_instrumentator
  # Metrics: http_requests_total, http_request_duration_seconds, http_requests_in_progress
  - job_name: 'fastapi'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # ML metrics exporter — drift scores, model accuracy, version, health
  # Source: python src/metrics_server.py running on port 8001
  - job_name: 'ml-metrics'
    static_configs:
      - targets: ['host.docker.internal:8001']
    metrics_path: '/metrics'
    scrape_interval: 60s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
