# docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: mlflow_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: mlflow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mlflow:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      MLFLOW_TRACKING_URI: postgresql://mlflow_user:your_password@db/mlflow_db

volumes:
  postgres_data: