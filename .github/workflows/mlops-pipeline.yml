name: MLOps Pipeline

# WHY CI/CD?
# Every push is automatically tested and trained.
# Humans only intervene when something fails.
# "If it's not tested, it's broken" — CI enforces this.

# BUG FIX (Bug 2):
#   The train job was using python-version: '3.9' while the test job
#   used '3.12'. This caused a version mismatch — tests passed on 3.12
#   but the model was trained on 3.9. A dependency working on 3.12 could
#   silently fail on 3.9 in production.
#   Fix: both jobs now use python-version: '3.12'.

on:
  workflow_dispatch: {}
  # push:
  #   branches: [ main, develop ]
  # pull_request:
  #   branches: [ main ]
  # schedule:
  #   - cron: '0 2 * * 1'   # Every Monday at 2 AM — scheduled retraining


jobs:

  # ── Job 1: Test ───────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'           # unchanged — was already correct

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run unit tests with coverage
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Job 2: Train (only on main branch) ───────────────────────────────────────
  train:
    name: Train & Register Model
    runs-on: ubuntu-latest
    needs: test            # Only runs if tests pass
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'           # ← FIX: was '3.9', now matches test job

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          ENVIRONMENT: production
        run: python src/train.py

      - name: Register best model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python src/model_registry.py