# ── Secrets ───────────────────────────────────────────────────────────────────
# Stores credentials as base64-encoded strings.
# Never commit actual secrets to git — use sealed-secrets or vault in production.
#
# HOW TO ENCODE:
#   echo -n "your_value" | base64
#
# HOW TO DECODE (verify):
#   echo "base64string" | base64 -d
#
# Current values encoded from your .env:
#   mlflow_user              → bWxmbG93X3VzZXI=
#   mlflow_password_2026     → bWxmbG93X3Bhc3N3b3JkXzIwMjY=
#   mlflow_db                → bWxmbG93X2Ri
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: mlops-secrets
  namespace: mlops
  labels:
    app.kubernetes.io/part-of: mlops-stack
type: Opaque
data:
  # echo -n "mlflow_user" | base64
  POSTGRES_USER:     bWxmbG93X3VzZXI=
  # echo -n "mlflow_password_2026" | base64
  POSTGRES_PASSWORD: bWxmbG93X3Bhc3N3b3JkXzIwMjY=
  # echo -n "mlflow_db" | base64
  POSTGRES_DB:       bWxmbG93X2Ri
  # echo -n "postgresql://mlflow_user:mlflow_password_2026@postgres:5432/mlflow_db" | base64
  DATABASE_URL:      cG9zdGdyZXNxbDovL21sZmxvd191c2VyOm1sZmxvd19wYXNzd29yZF8yMDI2QHBvc3RncmVzOjU0MzIvbWxmbG93X2Ri
