version: '3.8'

# Run the complete MLOps observability stack:
#   docker compose up -d
#
# Your Python services (FastAPI port 8000, metrics_server port 8001)
# run locally in WSL. Prometheus reaches them via host.docker.internal.
#
# Services:
#   db         → PostgreSQL 14       (port 5432)
#   mlflow     → MLflow 3.12         (port 5000)
#   prometheus → Prometheus          (port 9090)
#   grafana    → Grafana dashboards  (port 3000)

services:

  # ── PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:14
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MLflow tracking server ─────────────────────────────────────
  mlflow:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}
      PYTHONWARNINGS: ${PYTHONWARNINGS:-ignore::UserWarning:pydantic}
    restart: on-failure

  # ── Prometheus ─────────────────────────────────────────────────
  # Scrapes FastAPI (:8000/metrics) and ML exporter (:8001/metrics)
  # both running locally in WSL via host.docker.internal.
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Grafana ────────────────────────────────────────────────────
  # Auto-provisioned with Prometheus datasource + MLOps dashboard.
  # Login: admin / admin  (change password on first login)
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/mlops.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
