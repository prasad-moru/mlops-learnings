version: '3.8'

# WHY Docker Compose?
# Runs PostgreSQL + MLflow as a single stack with one command:
#   docker-compose up -d
# All services talk to each other on the internal network.

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data   # data persists across restarts
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MLflow Server — experiment tracking UI ────────────────────────────────────
  mlflow:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}
    restart: on-failure

volumes:
  postgres_data:
