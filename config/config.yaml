# config/config.yaml
# Central configuration file — import via src/config.py

model:
  type: RandomForest
  n_estimators: 100
  max_depth: 5
  min_samples_split: 2
  min_samples_leaf: 1
  random_state: 42

data:
  test_size: 0.2
  random_state: 42
  dataset: iris

mlflow:
  experiment_name: iris_classification
  run_name: rf_baseline
  model_name: iris_classifier

monitoring:
  drift_threshold: 0.05
  min_accuracy: 0.90
  check_interval_hours: 24

api:
  host: "0.0.0.0"
  port: 8000
  reload: false
